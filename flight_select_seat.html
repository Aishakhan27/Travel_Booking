<!DOCTYPE html>
<html>
<head>
    <title>Select Flight Seat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .plane-container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            width: 600px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            text-align: center;
        }

        .cockpit {
            font-weight: bold;
            margin-bottom: 20px;
            color: #555;
        }

        .plane-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .seat {
            background: #e0e0e0;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s ease;
        }

        .seat:hover {
            background: #1e90ff;
            color: white;
        }

        .seat.selected {
            background: #2ecc71;
            color: white;
        }

        .aisle {
            background: transparent;
        }

        .confirm-btn {
            margin-top: 20px;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            background: #ff5722;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .confirm-btn:hover {
            background: #e64a19;
        }

        .legend {
            margin-top: 15px;
            font-size: 14px;
        }

        .legend span {
            margin: 0 10px;
        }

        .box {
            display: inline-block;
            width: 15px;
            height: 15px;
            margin-right: 5px;
        }

        .available { background: #e0e0e0; }
        .selected-box { background: #2ecc71; }
    </style>
</head>
<body>

<div class="plane-container">

    <div class="cockpit">🧑‍✈ Cockpit</div>
    <h2>Select Your Flight Seat</h2>

    <form action="/flight/book" method="POST">

        <input type="hidden" name="booking_type" value="flight">
        <input type="hidden" name="flight_number" value="{{ flight_number }}">
        <input type="hidden" name="price" value="{{ price }}">
        <input type="hidden" name="name" value="{{ name }}">
        <input type="hidden" name="email" value="{{ email }}">
        <input type="hidden" name="from_city" value="{{ from_city }}">
        <input type="hidden" name="to_city" value="{{ to_city }}">
        <input type="hidden" name="date" value="{{ date }}">
        <input type="hidden" name="seat_number" id="selectedSeatInput" required>

        <div class="plane-grid">
            {% for row in range(1, 11) %}
                {% for col in ['A','B','C'] %}
                    <div class="seat" onclick="selectSeat(this, '{{ row }}{{ col }}')">
                        {{ row }}{{ col }}
                    </div>
                {% endfor %}

                <div class="aisle"></div>

                {% for col in ['D','E','F'] %}
                    <div class="seat" onclick="selectSeat(this, '{{ row }}{{ col }}')">
                        {{ row }}{{ col }}
                    </div>
                {% endfor %}
            {% endfor %}
        </div>

        <button type="submit" class="confirm-btn">
            Confirm Seat & Continue
        </button>

    </form>

    <div class="legend">
        <span><span class="box available"></span>Available</span>
        <span><span class="box selected-box"></span>Selected</span>
    </div>

</div>

<script>
function selectSeat(element, seatNumber) {
    document.querySelectorAll('.seat').forEach(seat => {
        seat.classList.remove('selected');
    });

    element.classList.add('selected');
    document.getElementById("selectedSeatInput").value = seatNumber;
}
</script>

</body>
</html>
